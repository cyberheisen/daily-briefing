name: Daily Briefing Generator

on:
  schedule:
    # 4:00 AM CST = 10:00 AM UTC (standard time)
    # 4:00 AM CDT = 09:00 AM UTC (daylight saving time)
    # Running at both to cover DST transitions
    - cron: '0 9 * 3-11 *'   # 4am CDT (Mar-Nov)
    - cron: '0 10 * 1-2,12 *' # 4am CST (Dec-Feb)
  workflow_dispatch:          # Allow manual trigger from GitHub UI anytime

permissions:
  contents: write             # Required to push the generated HTML to gh-pages

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_briefing.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true      # Keep previous days' briefings
          destination_dir: .    # Publish to root of gh-pages branch
